<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login - ncaa betting tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #0e1117;
            color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 13px;
        }
        .login-container {
            background: #262730;
            border: 1px solid #4a4a4a;
            border-radius: 6px;
            padding: 32px;
            width: 320px;
        }
        h1 {
            text-align: center;
            margin-bottom: 6px;
            font-size: 18px;
            color: #fafafa;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 12px;
        }
        label {
            display: block;
            margin-bottom: 3px;
            font-size: 12px;
            color: #aaa;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid #4a4a4a;
            border-radius: 3px;
            background: #0e1117;
            color: #fafafa;
            font-size: 12px;
            margin-bottom: 12px;
        }
        input:focus {
            outline: none;
            border-color: #ff4b4b;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #ff4b4b;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
        }
        button:hover { background: #ff3333; }
        .error {
            background: #5d1f1f;
            color: #ff6b6b;
            padding: 6px;
            border-radius: 3px;
            margin-bottom: 12px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>ncaa betting tool</h1>
        <div class="subtitle">march madness</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/set_username">
            <label for="username">enter your name</label>
            <input type="text" id="username" name="username" required autofocus placeholder="e.g. cory">
            <button type="submit">enter</button>
        </form>
    </div>
</body>
</html>
